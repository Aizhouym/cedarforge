# Fine-tuning experiment config for run_experiments.sh
#
# Edit only this file to define your runs.
# Then launch with:
#   bash sft_gen/finetune/run_experiments.sh
#   bash sft_gen/finetune/run_experiments.sh --run A
#   bash sft_gen/finetune/run_experiments.sh --run C --eval

BASE_MODEL="${HOME}/model/qwen35b-full"
TRAIN_FILE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/data/train.jsonl"
VAL_FILE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/data/val.jsonl"
VAL_META_FILE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/data/val.meta.jsonl"
OUTPUT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/checkpoints"

# Global switches
PREPARE_DATA=1
EVAL_AFTER_TRAIN=0
MASTER_PORT_BASE=29500

# Order matters. This is the default run order when no --run is given.
RUN_IDS=(H I)

# ---------------------------------------------------------------------------
# Example runs
# ---------------------------------------------------------------------------

# A: stable baseline on 2x H100
RUN_A_NAME="stable-baseline"
RUN_A_GPUS=2
RUN_A_BATCH=1
RUN_A_ACCUM=8
RUN_A_EPOCHS=4
RUN_A_LR="1e-4"
RUN_A_RANK=16
RUN_A_ALPHA=32
RUN_A_LORA_DROPOUT=0.05
RUN_A_MAX_SEQ_LEN=4096
RUN_A_USE_QLORA=0
RUN_A_DISABLE_LAZY_NO_MMAP=0
RUN_A_OUTPUT_DIR="${OUTPUT_ROOT}/run_A"
RUN_A_MASTER_PORT=29500

# B: same as A, higher learning rate
RUN_B_NAME="high-lr-control"
RUN_B_GPU=2
RUN_B_BATCH=1
RUN_B_ACCUM=8
RUN_B_EPOCHS=4
RUN_B_LR="2e-4"
RUN_B_RANK=16
RUN_B_ALPHA=32
RUN_B_LORA_DROPOUT=0.05
RUN_B_MAX_SEQ_LEN=4096
RUN_B_USE_QLORA=0
RUN_B_DISABLE_LAZY_NO_MMAP=0
RUN_B_OUTPUT_DIR="${OUTPUT_ROOT}/run_B"
RUN_B_MASTER_PORT=29501

# C: higher capacity on 4x H200
RUN_C_NAME="high-capacity"
RUN_C_GPUS=4
RUN_C_BATCH=2
RUN_C_ACCUM=4
RUN_C_EPOCHS=4
RUN_C_LR="1e-4"
RUN_C_RANK=32
RUN_C_ALPHA=64
RUN_C_LORA_DROPOUT=0.05
RUN_C_MAX_SEQ_LEN=4096
RUN_C_USE_QLORA=0
RUN_C_DISABLE_LAZY_NO_MMAP=0
RUN_C_OUTPUT_DIR="${OUTPUT_ROOT}/run_C"
RUN_C_MASTER_PORT=29502

# D: longer training on 4x H200
RUN_D_NAME="longer-training"
RUN_D_GPUS=4
RUN_D_BATCH=2
RUN_D_ACCUM=4
RUN_D_EPOCHS=6
RUN_D_LR="1e-4"
RUN_D_RANK=16
RUN_D_ALPHA=32
RUN_D_LORA_DROPOUT=0.05
RUN_D_MAX_SEQ_LEN=4096
RUN_D_USE_QLORA=0
RUN_D_DISABLE_LAZY_NO_MMAP=0
RUN_D_OUTPUT_DIR="${OUTPUT_ROOT}/run_D"
RUN_D_MASTER_PORT=29503

# ---------------------------------------------------------------------------
# E: 2x H100 — response-only loss, rank=32, more epochs
#
# H100 80GB: 67GB model leaves ~13GB headroom → batch=1 required.
# Effective batch = 2 GPUs × 1 × 16 accum = 32.
# Response-only loss covers ~27% of tokens → need more epochs to converge.
# LR=8e-5 (conservative for 70 examples, avoids overfitting).
# rank=32/alpha=64: more LoRA capacity than rank=16 with little extra memory.
# ---------------------------------------------------------------------------
RUN_E_NAME="h100-response-only"
RUN_E_GPUS=2
RUN_E_BATCH=1
RUN_E_ACCUM=16
RUN_E_EPOCHS=8
RUN_E_LR="8e-5"
RUN_E_RANK=32
RUN_E_ALPHA=64
RUN_E_LORA_DROPOUT=0.05
RUN_E_MAX_SEQ_LEN=4096
RUN_E_USE_QLORA=0
RUN_E_DISABLE_LAZY_NO_MMAP=0
RUN_E_OUTPUT_DIR="${OUTPUT_ROOT}/run_E"
RUN_E_MASTER_PORT=29504

# ---------------------------------------------------------------------------
# F: 4x H200 — response-only loss, rank=32, higher LR
#
# H200 141GB: 74GB headroom → batch=2 safe.
# Effective batch = 4 GPUs × 2 × 4 accum = 32 (same as E, for fair comparison).
# LR=1e-4: H200 has better throughput, more steps per epoch helps convergence.
# rank=32/alpha=64: same capacity as E.
# dropout=0.1: slightly higher to regularise with 4-GPU multi-replica training.
# ---------------------------------------------------------------------------
RUN_F_NAME="h200-response-only"
RUN_F_GPUS=4
RUN_F_BATCH=2
RUN_F_ACCUM=4
RUN_F_EPOCHS=8
RUN_F_LR="1e-4"
RUN_F_RANK=32
RUN_F_ALPHA=64
RUN_F_LORA_DROPOUT=0.1
RUN_F_MAX_SEQ_LEN=4096
RUN_F_USE_QLORA=0
RUN_F_DISABLE_LAZY_NO_MMAP=0
RUN_F_OUTPUT_DIR="${OUTPUT_ROOT}/run_F"
RUN_F_MASTER_PORT=29505

# ---------------------------------------------------------------------------
# G: 2x H100 NVL (93GB) — rank=64, same effective batch as E
#
# Cards are 93GB NVL, not 80GB — headroom is ~26GB per GPU.
# rank=64/alpha=128: 2× LoRA capacity vs Run E, adapter ~8GB, fits in headroom.
# All other settings identical to Run E for clean ablation on rank.
# QLoRA NOT used: incompatible with no-mmap patch on this HPC node.
# ---------------------------------------------------------------------------
RUN_G_NAME="h100-rank64"
RUN_G_GPUS=2
RUN_G_BATCH=1
RUN_G_ACCUM=16
RUN_G_EPOCHS=8
RUN_G_LR="8e-5"
RUN_G_RANK=64
RUN_G_ALPHA=128
RUN_G_LORA_DROPOUT=0.05
RUN_G_MAX_SEQ_LEN=4096
RUN_G_USE_QLORA=0
RUN_G_DISABLE_LAZY_NO_MMAP=0
RUN_G_OUTPUT_DIR="${OUTPUT_ROOT}/run_G"
RUN_G_MASTER_PORT=29506

# ---------------------------------------------------------------------------
# H: 2x H100 NVL — batch=2, rank=64, more epochs, lower LR (stability focus)
#
# 93GB cards have ~26GB headroom → batch=2 is safe (logits ~2.5GB extra).
# Effective batch = 2 GPUs × 2 × 8 accum = 32 (same as E/G for comparison).
# epochs=12: 70 examples + response-only loss (26% tokens) may underfit at 8.
# LR=5e-5: lower than E to reduce no-repair regressions seen in runE.
# rank=64/alpha=128: same as G, more LoRA capacity than E.
# Goal: stable single-shot + strong repair (fix the split-outcome from runE).
# ---------------------------------------------------------------------------
RUN_H_NAME="h100-batch2-stable"
RUN_H_GPUS=2
RUN_H_BATCH=2
RUN_H_ACCUM=8
RUN_H_EPOCHS=12
RUN_H_LR="5e-5"
RUN_H_RANK=64
RUN_H_ALPHA=128
RUN_H_LORA_DROPOUT=0.05
RUN_H_MAX_SEQ_LEN=4096
RUN_H_USE_QLORA=0
RUN_H_DISABLE_LAZY_NO_MMAP=0
RUN_H_OUTPUT_DIR="${OUTPUT_ROOT}/run_H"
RUN_H_MASTER_PORT=29507

# ---------------------------------------------------------------------------
# I: 2x H100 NVL — batch=1, rank=64, more epochs (convergence focus)
#
# Same memory footprint as Run E (proven to work), but 2× more training steps.
# epochs=16: maximise convergence on 70 examples with response-only loss.
# LR=8e-5: same as E — more epochs compensates for conservative LR.
# rank=64/alpha=128: same as G/H for capacity comparison.
# Goal: test whether more training steps alone fix the no-repair regression.
# ---------------------------------------------------------------------------
RUN_I_NAME="h100-epochs16"
RUN_I_GPUS=2
RUN_I_BATCH=1
RUN_I_ACCUM=16
RUN_I_EPOCHS=16
RUN_I_LR="8e-5"
RUN_I_RANK=64
RUN_I_ALPHA=128
RUN_I_LORA_DROPOUT=0.05
RUN_I_MAX_SEQ_LEN=4096
RUN_I_USE_QLORA=0
RUN_I_DISABLE_LAZY_NO_MMAP=0
RUN_I_OUTPUT_DIR="${OUTPUT_ROOT}/run_I"
RUN_I_MASTER_PORT=29508
